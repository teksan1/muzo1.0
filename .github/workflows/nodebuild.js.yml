name: Build and Release MediaHarbor
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    name: Build (${{ matrix.os }} ${{ matrix.arch || 'x64' }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 20.x
          - os: windows-latest
            node-version: 20.x
          - os: macos-latest
            node-version: 20.x
            arch: x64
          - os: macos-latest
            node-version: 20.x
            arch: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          npm ci
          npm install electron-builder --save-dev

      - name: Build for Windows
        if: matrix.os == 'windows-latest'
        run: |
          npm run build:win
          npm run build:win-portable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build for macOS (x64)
        if: matrix.os == 'macos-latest' && matrix.arch == 'x64'
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build for macOS (ARM64)
        if: matrix.os == 'macos-latest' && matrix.arch == 'arm64'
        run: npm run build:mac-arm64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build for Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          npm run build:linux
          npm run build:linux-portable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Distribution Files
        run: |
          mkdir -p dist-package
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp dist/*.exe dist-package/ 2>/dev/null || :
            cp dist/*.appx dist-package/ 2>/dev/null || :
            cp dist/*.zip dist-package/ 2>/dev/null || :
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            if [[ "${{ matrix.arch }}" == "arm64" ]]; then
              cp dist/*-arm64.dmg dist-package/ 2>/dev/null || :
              cp dist/*arm64.dmg.blockmap dist-package/ 2>/dev/null || :
            else
              cp dist/*-x64.dmg dist-package/ 2>/dev/null || :
              cp dist/*x64.dmg.blockmap dist-package/ 2>/dev/null || :
            fi
          else
            cp dist/*.deb dist-package/ 2>/dev/null || :
            cp dist/*.AppImage dist-package/ 2>/dev/null || :
            cp dist/*.snap dist-package/ 2>/dev/null || :
            cp dist/*.zip dist-package/ 2>/dev/null || :
          fi
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-${{ matrix.arch || 'x64' }}
          path: dist-package/
          retention-days: 5

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Git
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          
      - name: Get version from package.json
        id: package-version
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> $GITHUB_OUTPUT
          
      - name: Create and push tag
        run: |
          tag_name="v${{ steps.package-version.outputs.version }}"
          git tag -a $tag_name -m "Release $tag_name"
          git push origin $tag_name
          
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.package-version.outputs.version }}
          name: Release v${{ steps.package-version.outputs.version }}
          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.appx
            release-artifacts/**/*.dmg
            release-artifacts/**/*.dmg.blockmap
            release-artifacts/**/*.zip
            release-artifacts/**/*.deb
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.snap
          draft: false
          prerelease: false
          generate_release_notes: true