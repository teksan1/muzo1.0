app-id: org.mediaharbor.MediaHarbor
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node24
command: mediaharbor

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node24/bin

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --socket=pulseaudio
  - --share=network
  - --filesystem=xdg-download
  - --talk-name=org.freedesktop.portal.Desktop
  - --own-name=org.mpris.MediaPlayer2.$APP_ID

modules:
  - name: mediaharbor
    buildsystem: simple

    build-options:
      no-debuginfo: true
      env:
        CARGO_HOME: /run/build/mediaharbor/cargo-home
        RUSTUP_HOME: /usr/lib/sdk/rust-stable
        RUSTUP_TOOLCHAIN: stable
        CARGO_INCREMENTAL: '0'
        npm_config_cache: /run/build/mediaharbor/flatpak-node/npm-cache

    sources:
      - type: git
        url: https://github.com/MediaHarbor/mediaharbor.git
        tag: GIT_TAG_PLACEHOLDER
        commit: GIT_COMMIT_PLACEHOLDER

      - cargo-sources.json

      - generated-sources.json

    build-commands:
      - mkdir -p .cargo
      - |
        printf '[source.crates-io]\nreplace-with = "vendored-sources"\n\n[source."vendored-sources"]\ndirectory = "cargo/vendor"\n' > .cargo/config.toml

      - npm ci --ignore-scripts

      - node node_modules/.bin/patch-package

      - node scripts/patch-librespot.js

      - npm run build:react

      - cd src/app && cargo build --release

      - install -Dm755 target/release/mediaharbor /app/bin/mediaharbor
      - install -Dm644 packaging/flatpak/org.mediaharbor.MediaHarbor.desktop /app/share/applications/org.mediaharbor.MediaHarbor.desktop
      - install -Dm644 packaging/flatpak/org.mediaharbor.MediaHarbor.metainfo.xml /app/share/metainfo/org.mediaharbor.MediaHarbor.metainfo.xml
      - install -Dm644 src/app/icons/32x32.png /app/share/icons/hicolor/32x32/apps/org.mediaharbor.MediaHarbor.png
      - install -Dm644 src/app/icons/64x64.png /app/share/icons/hicolor/64x64/apps/org.mediaharbor.MediaHarbor.png
      - install -Dm644 src/app/icons/128x128.png /app/share/icons/hicolor/128x128/apps/org.mediaharbor.MediaHarbor.png
      - install -Dm644 src/app/icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/org.mediaharbor.MediaHarbor.png
      - install -Dm644 src/app/icons/icon.png /app/share/icons/hicolor/512x512/apps/org.mediaharbor.MediaHarbor.png
